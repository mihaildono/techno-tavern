<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="description" content="Социално пространство в Пловдив" />

    <title>Techno Tavern Пловдив</title>

    <link rel="icon" href="./assets/logo.svg">

    <!-- Preload critical above-the-fold image -->
    <link rel="preload" href="./assets/logo.svg" as="image" type="image/svg+xml" />

    <!-- Preconnect to external domains for faster resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://masto.bg">

    <!-- Critical CSS inline or load asynchronously -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Load Google Fonts asynchronously to prevent render blocking -->
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet" />
    </noscript>
</head>

<body>
    <main class="layout">
        <div class="mainHeader">
            <img src="./assets/logo.svg" class="logo" alt="logo" fetchpriority="high" />
            <h1>Techno Tavern</h1>
            <span>Социално пространство в Пловдив</span>
        </div>

        <nav class="tabs">
            <a href="/" class="tab active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg></a>
            <a href="/news.html" class="tab"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path
                        d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z" />
                </svg></a>
        </nav>

        <div class="content">
            <!-- mastodon timeline -->
            <div id="mastodon-feed">
                <div class="feed-loading">Зареждане на публикации...</div>
            </div>
            <!-- /mastodon timeline -->
        </div>
    </main>

    <footer class="site-footer">
        <span>Архив</span>
        <a href="/politics/" class="footer-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm2 15H10v-1h4v1zm0-2H10v-1h4v1zm-1.5-3.59V14h-1v-2.59L9.67 9.59l.71-.71L12 10.5l1.62-1.62.71.71-1.83 1.82z" />
            </svg>Политика</a>
    </footer>

    <script>
        async function loadMastodonPosts() {
            const feedContainer = document.getElementById('mastodon-feed');

            try {
                const response = await fetch('https://masto.bg/api/v1/accounts/115955044932859142/statuses?limit=5');
                const posts = await response.json();

                feedContainer.innerHTML = '';

                posts.forEach(post => {
                    const postElement = document.createElement('div');
                    postElement.className = 'mastodon-post';

                    // Remove hyperlinks from hashtags but keep them styled
                    let content = post.content;
                    content = content.replace(/<a[^>]*class="[^"]*mention hashtag[^"]*"[^>]*>(.*?)<\/a>/g, '<span class="hashtag">$1</span>');

                    postElement.innerHTML = `
                        <div class="post-content">${content}</div>
                    `;

                    feedContainer.appendChild(postElement);
                });
            } catch (error) {
                feedContainer.innerHTML = '<div class="feed-error">Failed to load posts. Please try again later.</div>';
            }
        }

        // Load posts when page is ready
        document.addEventListener('DOMContentLoaded', loadMastodonPosts);
    </script>
</body>

</html>
